name: humann
description: Functional profiling of metagenomic communities
keywords:
  - metagenomics
  - functional profiling
  - pathways
  - gene families
tools:
  - humann:
      description: "HUMAnN: The HMP Unified Metabolic Analysis Network"
      homepage: https://huttenhower.sph.harvard.edu/humann/
      documentation: https://github.com/biobakery/humann

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
  - fastq:
      type: file
      description: Quality-controlled FASTQ file
      pattern: "*.fastq"
  - metaphlan_unknown_list:
      type: file
      description: MetaPhlAn taxonomic profile
      pattern: "*.tsv"
  - chocophlan_db:
      type: directory
      description: ChocoPhlAn pangenome database
  - uniref_db:
      type: directory
      description: UniRef protein database

output:
  - genefamilies:
      type: file
      description: Gene family abundance table
      pattern: "out_genefamilies.tsv.gz"
  - pathabundance:
      type: file
      description: Pathway abundance table
      pattern: "out_pathabundance.tsv.gz"
  - pathcoverage:
      type: file
      description: Pathway coverage table
      pattern: "out_pathcoverage.tsv.gz"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@seandavi"
